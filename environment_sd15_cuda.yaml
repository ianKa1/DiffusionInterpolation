name: SD1.5
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10

  # PyTorch with CUDA support (CUDA 11.8)
  - pytorch::pytorch>=2.0.0
  - pytorch::torchvision>=0.15.0
  - pytorch::pytorch-cuda=11.8

  # Core ML libraries
  - pip
  - numpy
  - pillow
  - tqdm
  - matplotlib

  # Pip packages (HuggingFace ecosystem)
  - pip:
      - diffusers>=0.21.0
      - transformers>=4.30.0
      - accelerate>=0.20.0
      - safetensors>=0.3.1
      - huggingface-hub
      - omegaconf
      - einops
      - scipy
      - ftfy
      - regex
